<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Welcome to the Calculator</h1>
    </header>

    <div class="calculator">
      <div class="screen">
        <div class="screen-grid">
          <input type="text" id="num1" readonly />
          <input type="text" id="sign" readonly />
          <input type="text" id="num2" readonly />
          <input type="text" id="result" readonly />
        </div>
      </div>

      <button class="btn" id="c">C</button>
      <button class="btn" id="delete">←</button>
      <button class="btn">/</button>
      <button class="btn">*</button>

      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn">-</button>

      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn">+</button>

      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn" id="equal">=</button>

      <button class="btn" id="zero">0</button>
      <button class="btn">.</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
